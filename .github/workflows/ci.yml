name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ --max-line-length=120 --count --show-statistics

      - name: Security check - no hardcoded secrets
        run: |
          python tests/test_config_security.py

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t drawing-error-correction .

      - name: Test Docker image starts
        run: |
          docker run -d --name test-container \
            -e MULTIMODAL_API_URL=http://localhost:8000 \
            -e MULTIMODAL_API_KEY=test-key \
            -p 5000:5000 \
            drawing-error-correction
          sleep 5
          curl -f http://localhost:5000/ || exit 1
          docker stop test-container
